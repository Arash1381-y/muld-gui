<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Deep Sea Gradient (Cyan to Teal) -->
    <linearGradient id="deepSea" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Drop Shadow for Depth -->
    <filter id="glassShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Transparent Background / Padding -->
  <rect width="512" height="512" fill="none" />

  <!-- App Icon Base -->
  <rect x="61" y="61" width="390" height="390" rx="90" fill="#0B1021" filter="url(#glassShadow)" />
  
  <!-- Icon Art (Scaled up for standard 512x512 bounds) -->
  <g transform="translate(256, 256) scale(1.6)">
    <!-- Left Thread -->
    <rect x="-45" y="-55" width="20" height="60" rx="10" fill="url(#deepSea)" />
    
    <!-- Right Thread -->
    <rect x="25" y="-55" width="20" height="60" rx="10" fill="url(#deepSea)" />
    
    <!-- Center Thread -->
    <rect x="-10" y="-75" width="20" height="80" rx="10" fill="url(#deepSea)" />
    
    <!-- Bottom Chevron (Merging the streams) -->
    <path d="M -45 15 L 0 60 L 45 15" fill="none" stroke="url(#deepSea)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>

